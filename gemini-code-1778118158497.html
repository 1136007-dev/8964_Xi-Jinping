<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>1945 柏林地下室模擬器</title>
    <style>
        body { background-color: #1a1a1a; color: #d4af37; font-family: 'Times New Roman', serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #bunker { width: 600px; background: #222; border: 5px double #d4af37; padding: 25px; box-shadow: 0 0 50px rgba(255,0,0,0.2); position: relative; }
        h1 { text-align: center; color: #ff0000; letter-spacing: 5px; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        #screen { height: 160px; font-size: 1.2rem; line-height: 1.5; margin-bottom: 20px; color: #eee; font-style: italic; }
        .stats { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 15px; border: 1px solid #444; padding: 5px; }
        .choices { display: grid; gap: 10px; }

        button:hover { background: #d4af37; color: black; font-weight: bold; }
        #ending { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; flex-direction: column; justify-content: center; align-items: center; text-align: center; z-index: 10; }
        .danger { color: #ff4444; }
    </style>
</head>

    <div id="screen">正在聽取前線戰報... 地面傳來震動。</div>

        <p id="end-desc"></p>

    </div>
</div>
